<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 160 160" fill="none">
    <!-- 
        SYNTRA LOGO: Icon Only & Full Logo with Typography
        Style: Modern, Futuristic, Minimalist SaaS, AI-native
        Designed for Dark Mode
    -->
    
    <defs>
        <!-- Gradient defining AI intelligence and future connectivity -->
        <linearGradient id="synth_grad" x1="50" y1="50" x2="110" y2="110" gradientUnits="userSpaceOnUse">
            <stop offset="0.1" stop-color="#ffcf76ce"/> <!-- Cyan / Electric Blue -->
            <stop offset="1" stop-color="#fffdf4ff"/>   <!-- Neon Purple -->
        </linearGradient>
        
        <!-- Subtle gradient for the text -->
        <linearGradient id="text_grad" x1="0" y1="0" x2="100" y2="0" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#FFFFFF"/>
            <stop offset="1" stop-color="#E2E8F0"/>
        </linearGradient>
    </defs>

    <!-- ********************************************** -->
    <!-- SECTION 1: ICON ONLY (For Avatars, Mobile) -->
    <!-- ********************************************** -->
    <g transform="translate(20, 20) scale(2)">
        <title>Syntra Icon</title>
        
        <!-- Concept: Speech Bubble + Neural Network / AI Node -->
        <!-- Stylized "S" curve integrated into the design -->
        
        <!-- Main Structure (Neural Node Speech Bubble) -->
        <path 
            d="M 68 28 
               C 90 28, 108 46, 108 68 
               C 108 90, 90 108, 68 108 
               C 60 108, 52 105, 46 100
               L 28 118 
               L 36 96
               C 30 90, 28 80, 28 68
               C 28 46, 46 28, 68 28
               Z" 
            stroke="url(#synth_grad)" 
            stroke-width="5" 
            fill="none" 
            stroke-linejoin="round"
            style="filter: drop-shadow(0px 0px 8px rgba(45, 212, 191, 0.4));"
        />

        <!-- The "AI" Connection (Stylized 'S' / Waveform) -->
        <path 
            d="M 48 68
               Q 58 53, 68 68
               T 88 68" 
            stroke="url(#synth_grad)" 
            stroke-width="6" 
            stroke-linecap="round" 
            fill="none"
            style="filter: drop-shadow(0px 0px 6px rgba(139, 92, 246, 0.5));"
        />
        
        <!-- Central Focus Point (The Intelligence Core) -->
        <circle cx="68" cy="68" r="6" fill="#FFFFFF"/>
        <circle cx="68" cy="68" r="6" fill="#ffcf76ff" opacity="0.6" style="filter: blur(2px);"/>
    </g>

</svg>
